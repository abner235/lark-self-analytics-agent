# Banxa 跨域关联分析 Runbook
name: banxa-cross
description: 转化漏斗 + 订单的联合分析：转化率与GMV联动、漏斗到成交的端到端追踪
tables: [Banxa转化漏斗, Banxa订单]
exemplars: [banxa_funnel, banxa_orders]
triggers: [转化率.*金额, 金额.*转化, 漏斗.*订单, 订单.*漏斗, 同时, 联合, 关联, 端到端, 全链路, 综合]

analysis: |
  ## 分析框架（跨域关联）

  核心问题：转化率变化和交易金额变化之间有没有因果关系？

  分析路径：
  1. 分别看转化率和 GMV 的趋势，确认是否同向变化
  2. 按共享维度（支付方式 / 国家）对比，找到同时异常的维度
  3. 判断因果方向：是转化率下降导致成交减少，还是客单价变化导致 GMV 变化

rules: |
  - 跨表 JOIN key = (日期, 国家, 支付方式)
  - ⚠️ 漏斗表每个 key 组合有 5 行（5 个阶段）。跨表查询时必须先用 CTE 把漏斗表聚合到目标维度，再 JOIN 订单表。不要直接 JOIN 两张原始表。
  - 环比对比（昨天 vs 前天）用多个 CTE 分别算两天指标，最后 CROSS JOIN 合并。
