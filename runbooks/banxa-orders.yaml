# Banxa 订单/交易分析 Runbook
name: banxa-orders
description: 订单与交易分析：GMV、客单价、手续费、支付方式/国家维度拆解
tables: [Banxa订单]
exemplars: [banxa_orders]
triggers: [交易金额, 金额, GMV, 订单, 客单价, 手续费, 佣金, 成交, 收入, revenue, 订单数, 笔数]

analysis: |
  ## 分析框架（订单/交易）

  客单价 = 交易金额 / 订单数
  手续费率 = 手续费 / 交易金额

  分析路径（按需裁剪）：
  1. 确认整体 GMV / 订单量的趋势
  2. 按支付方式或国家拆解，找结构性变化
  3. 看客单价和手续费率是否异常

rules: |
  - 订单数字段已是预聚合的计数值，跨行汇总用 SUM(订单数)。
  - 金额字段已是美元，不需要汇率转换。
